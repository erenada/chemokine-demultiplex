# Conda Environment File for Chemokine Demultiplexing Pipeline
# Author: Eren Ada, PhD
# Date: 08/07/2025
#
# Usage: conda env create -f environment.yml

name: demultiplex_pipeline

channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.9
  
  # Bioinformatics tools
  - seqkit
  - cutadapt
  - bioawk
  - samtools
  - fastqc
  - gawk
  
  # Python packages via conda
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - plotly
  - biopython
  - jupyter
  
  # pip dependencies
  - pip
  - pip:
    - pyfastx>=0.8.4
    - edlib>=1.3.9
    - regex>=2021.4.4
    - tqdm>=4.62.0